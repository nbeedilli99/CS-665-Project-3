{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Vendors</h4>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addVendorModal">
        + Add Vendor
    </button>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Vendor Name</th>
                    <th>Cuisine Type</th>
                    <th>Added By</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for v in vendors %}
                <tr>
                    <td>{{ v.VendorID }}</td>
                    <td>{{ v.VendorName }}</td>
                    <td><span class="badge bg-info text-dark">{{ v.CuisineType }}</span></td>
                    <td>{{ v.AddedBy_Meta }}</td>
                    <td>
                        <a href="/vendors/delete/{{ v.VendorID }}"
                            class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Delete this vendor?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Vendor Modal -->
<div class="modal fade" id="addVendorModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Vendor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="/vendors/add" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Vendor Name</label>
                        <input type="text" name="VendorName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cuisine Type</label>
                        <input type="text" name="CuisineType" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Add Vendor</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
